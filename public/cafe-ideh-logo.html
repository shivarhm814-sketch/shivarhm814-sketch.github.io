    justify-content: center;
    background: #F7F7FB;
    font-family: 'Morabba', 'Vazirmatn', Tahoma, sans-serif;
  }

  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .wordmark {
    direction: rtl;
    text-align: center;
    font-family: 'Morabba', 'Vazirmatn', Tahoma, sans-serif;
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    margin-top: -18px;
  }
  .wordmark .kafe { color: #5B54E8; }
  .wordmark .ideh { color: #FF7A59; }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 260px;
    margin-top: 6px;
  }
  .divider .line {
    flex: 1;
    height: 2px;
    border-radius: 999px;
  }
  .divider .line.right {
    background: linear-gradient(to left, #5B54E8, rgba(91,84,232,0));
  }
  .divider .line.left {
    background: linear-gradient(to right, #FF7A59, rgba(255,122,89,0));
  }
  .divider .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #FF7A59;
    flex: none;
  }

  .subtitle {
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #FF7A59;
    letter-spacing: .2px;
    margin-top: 2px;
  }

  /* ===== انیمیشن‌ها ===== */
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-9px); }
  }
  @keyframes pulse {
    0%, 100% { opacity: .35; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.6); }
  }
  @keyframes steamDraw {
    0%   { stroke-dashoffset: 460; opacity: 0; }
    10%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { stroke-dashoffset: 0; opacity: 0; }
  }

  .float-el { animation: float 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
  .pulse-el { animation: pulse 2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
  .steam-path { stroke-dasharray: 460; animation: steamDraw 4s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) {
    .float-el, .pulse-el, .steam-path {
      animation: none !important;
    }
    .steam-path { stroke-dashoffset: 0; opacity: .9; }
  }
</style>
</head>
<body>

<div class="logo-wrap">
  <svg width="440" height="530" viewBox="0 0 440 530" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- گرادیان بخار -->
      <linearGradient id="steamGrad" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%"   stop-color="#FF7844"/>
        <stop offset="35%"  stop-color="#FFBDA0"/>
        <stop offset="68%"  stop-color="#E8E6FF"/>
        <stop offset="100%" stop-color="#8C84F4"/>
      </linearGradient>

      <!-- گرادیان بدنه‌ی فنجان -->
      <linearGradient id="cupGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%"   stop-color="#8C84F4"/>
        <stop offset="50%"  stop-color="#5B54E8"/>
        <stop offset="100%" stop-color="#2C26A0"/>
      </linearGradient>

      <!-- هایلایت شیشه‌ای روی فنجان -->
      <radialGradient id="cupHighlight" cx="28%" cy="20%" r="75%">
        <stop offset="0%"   stop-color="rgba(255,255,255,.30)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>

      <!-- گرادیان مایع قهوه -->
      <radialGradient id="coffeeGrad" cx="50%" cy="35%" r="70%">
        <stop offset="0%"   stop-color="#FFAB84"/>
        <stop offset="100%" stop-color="#FF6030"/>
      </radialGradient>

      <!-- گرادیان نعلبکی -->
      <linearGradient id="saucerGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#5B54E8"/>
        <stop offset="100%" stop-color="#2C26A0"/>
      </linearGradient>

      <!-- سایه‌ی فنجان -->
      <filter id="cupShadow" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(44,38,160,.40)"/>
      </filter>
    </defs>

    <!-- ===== پس‌زمینه: قوس دَش‌دار ===== -->
    <path d="M 72,322 Q 215,224 354,184" fill="none" stroke="#FF7A59" stroke-width="2" stroke-dasharray="5 4" opacity=".34"/>

    <!-- ===== پس‌زمینه: مربع‌های پراکنده‌ی پالس‌دار ===== -->
    <rect class="pulse-el" x="60"  y="90"  width="6" height="6" fill="#FF7A59" style="animation-delay:0s"/>
    <rect class="pulse-el" x="380" y="140" width="8" height="8" fill="#5B54E8" style="animation-delay:.3s"/>
    <rect class="pulse-el" x="30"  y="230" width="5" height="5" fill="#5B54E8" style="animation-delay:.6s"/>
    <rect class="pulse-el" x="405" y="300" width="7" height="7" fill="#FF7A59" style="animation-delay:.9s"/>
    <rect class="pulse-el" x="20"  y="400" width="6" height="6" fill="#FF7A59" style="animation-delay:1.2s"/>
    <rect class="pulse-el" x="395" y="420" width="5" height="5" fill="#5B54E8" style="animation-delay:1.5s"/>
    <rect class="pulse-el" x="200" y="30"  width="6" height="6" fill="#5B54E8" style="animation-delay:1.8s"/>

    <!-- ===== بخار ===== -->
    <path class="steam-path" d="M 220,314 C 166,270 284,216 220,166 C 156,116 262,78 218,40"
      fill="none" stroke="#8C84F4" stroke-width="44" opacity=".32" stroke-linecap="round"/>
    <path class="steam-path" d="M 220,314 C 166,270 284,216 220,166 C 156,116 262,78 218,40"
      fill="none" stroke="url(#steamGrad)" stroke-width="24" stroke-linecap="round"/>

    <!-- ===== دسته‌ی فنجان ===== -->
    <path d="M 314,350 C 392,350 392,448 310,448" fill="none" stroke="#2C26A0" stroke-width="32" stroke-linecap="round"/>
    <path d="M 314,364 C 370,364 370,434 310,434" fill="none" stroke="#4A44CC" stroke-width="13" stroke-linecap="round" opacity=".48"/>

    <!-- ===== بدنه‌ی فنجان ===== -->
    <path filter="url(#cupShadow)" d="M 116,314 L 324,314 C 328,315 331,324 329,334 L 306,464 Q 220,486 134,464 L 111,334 C 109,324 112,315 116,314 Z" fill="url(#cupGrad)"/>
    <path d="M 116,314 L 324,314 C 328,315 331,324 329,334 L 306,464 Q 220,486 134,464 L 111,334 C 109,324 112,315 116,314 Z" fill="url(#cupHighlight)"/>

    <!-- لبه‌ی بالایی فنجان -->
    <ellipse cx="220" cy="314" rx="104" ry="13" fill="#5650CC"/>
    <ellipse cx="220" cy="312" rx="102" ry="11" fill="#7870E8"/>

    <!-- مایع قهوه -->
    <ellipse cx="220" cy="312" rx="88" ry="10" fill="url(#coffeeGrad)"/>
    <ellipse cx="203" cy="309" rx="36" ry="4" fill="rgba(255,255,255,.28)"/>

    <!-- نشانه‌ی برند روی فنجان -->
    <text x="183" y="422" font-family="Georgia, serif" font-size="32" fill="#ffffff">C</text>
    <circle cx="219" cy="412" r="6.5" fill="#FF7A59"/>
    <circle cx="219" cy="412" r="3.5" fill="rgba(255,255,255,.65)"/>

    <!-- ===== نعلبکی ===== -->
    <ellipse cx="220" cy="504" rx="120" ry="9" fill="rgba(44,38,160,.22)"/>
    <ellipse cx="220" cy="493" rx="116" ry="19" fill="url(#saucerGrad)"/>
    <ellipse cx="198" cy="489" rx="58" ry="6.5" fill="rgba(255,255,255,.22)"/>

    <!-- ===== مرورگر (بالا-راست) ===== -->
    <g transform="translate(244,10)">
      <g class="float-el" style="animation-delay:0s">
        <rect x="0" y="0" width="146" height="122" rx="13" fill="#ffffff" style="filter:drop-shadow(0 10px 18px rgba(44,38,160,.18))"/>
        <path d="M0,13 A13,13 0 0 1 13,0 L133,0 A13,13 0 0 1 146,13 L146,29 L0,29 Z" fill="#5B54E8"/>
        <circle cx="17" cy="15" r="5.5" fill="#8078F2"/>
        <circle cx="33" cy="15" r="5.5" fill="#8078F2"/>
        <circle cx="49" cy="15" r="5.5" fill="#8078F2"/>
        <rect x="8" y="35" width="64" height="54" rx="7" fill="#DCDBF9"/>
        <polyline points="12,80 30,60 44,74 60,52 68,80" fill="none" stroke="#5B54E8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity=".5"/>
        <circle cx="54" cy="48" r="6" fill="#FF7A59" opacity=".7"/>
        <rect x="80" y="38" width="58" height="8" rx="4" fill="#DCDBF9"/>
        <rect x="80" y="52" width="46" height="8" rx="4" fill="#DCDBF9"/>
        <rect x="80" y="66" width="52" height="8" rx="4" fill="#DCDBF9"/>
        <rect x="80" y="82" width="40" height="14" rx="7" fill="#FF7A59"/>
      </g>
    </g>

    <!-- ===== کرسر ماوس ===== -->
    <g transform="translate(348,116)">
      <g class="float-el" style="animation-delay:2s">
        <path d="M 0,0 L 0,36 L 11,27 L 18,44 L 25,41 L 18,24 L 30,24 Z" fill="#ffffff" stroke="#5B54E8" stroke-width="2.2" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- ===== T-tool (وسط-چپ) ===== -->
    <g transform="translate(38,160)">
      <g class="float-el" style="animation-delay:.9s">
        <rect x="0" y="0" width="82" height="82" rx="2" fill="none" stroke="#5B54E8" stroke-width="2" stroke-dasharray="4 3"/>
        <rect x="-5"  y="-5"  width="10" height="10" fill="#ffffff" stroke="#5B54E8" stroke-width="2"/>
        <rect x="77"  y="-5"  width="10" height="10" fill="#ffffff" stroke="#5B54E8" stroke-width="2"/>
        <rect x="-5"  y="77"  width="10" height="10" fill="#ffffff" stroke="#5B54E8" stroke-width="2"/>
        <rect x="77"  y="77"  width="10" height="10" fill="#ffffff" stroke="#5B54E8" stroke-width="2"/>
        <text x="16" y="62" font-family="Georgia, serif" font-size="58" fill="#5B54E8">T</text>
      </g>
    </g>

    <!-- ===== حباب چت (وسط-چپ پایین) ===== -->
    <g transform="translate(40,258)">
      <g class="float-el" style="animation-delay:1.5s">
        <rect x="0" y="0" width="100" height="40" rx="13" fill="#FF7A59"/>
        <circle cx="28" cy="20" r="6" fill="#ffffff"/>
        <circle cx="50" cy="20" r="6" fill="#ffffff"/>
        <circle cx="72" cy="20" r="6" fill="#ffffff"/>
      </g>
    </g>

    <!-- ===== آیکون تصویر (وسط-راست) ===== -->
    <g transform="translate(320,196)">
      <g class="float-el" style="animation-delay:.4s">
        <rect x="0" y="0" width="66" height="66" rx="14" fill="#DCDBF9"/>
        <polyline points="10,48 24,30 36,42 50,22 58,48" fill="none" stroke="#5B54E8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity=".55"/>
        <circle cx="46" cy="20" r="5.5" fill="#FF7A59" opacity=".75"/>
      </g>
    </g>
  </svg>

  <div class="wordmark">
    <span class="kafe">کافه </span><span class="ideh">ایده</span>
  </div>
  <div class="divider">
    <div class="line right"></div>
    <div class="dot"></div>
    <div class="line left"></div>
  </div>
  <div class="subtitle">استودیوی شیوا رحیمی</div>
</div>

</body>
</html>
